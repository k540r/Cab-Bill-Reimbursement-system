<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<!-- Required meta tags -->
<meta name="_csrf" th:content="${_csrf.token}" />
<meta name="_csrf_header" th:content="${_csrf.headerName}" />
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">

<!-- Meta -->
<link rel="shortcut icon" th:href="@{/assets/images/bisag_logo.png}">

<!-- Title -->
<title>Cab Bill Details</title>

<!-- *************
			************ Common Css Files *************
		************ -->
<!-- Animated css -->
<th:block th:replace="Header.html::allcsslink"></th:block>


<style>
input:autofill {
	box-shadow: 0 0 0px 100px rgba(0, 0, 0, 0) inset !important;
}
</style>
<!-- <script th:src="@{/assets/js/billreimbursement.js}"></script> -->

</head>

<body>



	<!-- Page wrapper start -->
	<div class="page-wrapper">

		<!-- Sidebar wrapper start -->
		<nav class="sidebar-wrapper">

			<!-- Sidebar brand starts -->
			<div class="sidebar-brand">
				<a href="emp_Dash" class="logo"> <img
					th:src="@{/assets/images/bisag_logo.png}" alt="Admin Dashboards" />
				</a>
			</div>
			<!-- Sidebar brand starts -->

			<!-- Sidebar menu starts -->
			<div class="sidebar-menu" th:insert="Header.html::side-menu-bar"></div>
			<!-- Sidebar menu ends -->

		</nav>
		<!-- Sidebar wrapper end -->

		<!-- *************
				************ Main container start *************
			************* -->
		<div class="main-container">

			<!-- Page header starts -->
			<div class="page-header" th:replace="Header.html::user-pageheader"></div>
			<!-- Page header ends -->

			<!-- Content wrapper scroll start -->
			<div class="content-wrapper-scroll">

				<!-- Content wrapper start -->
				<div class="content-wrapper">

					<!-- Row start -->
					<div class="row">
						<div class="col-xxl-3 col-sm-6 col-12">
							<div class="stats-tile">
								<div class="sale-icon shade-green">
									<i class="bi bi-check2-square"></i>
								</div>
								<div class="sale-details">
									<h3 class="text-green" th:text="${approvedCount}">0</h3>
									<p>Approved</p>
								</div>
							</div>
						</div>
						<div class="col-xxl-3 col-sm-6 col-12">
							<div class="stats-tile">
								<div class="sale-icon shade-yellow">
									<i class="bi bi-exclamation-diamond"></i>
								</div>
								<div class="sale-details">
									<h3 class="text-yellow" th:text="${pendingCount}">0</h3>
									<p>Pending</p>
								</div>
							</div>
						</div>
						<div class="col-xxl-3 col-sm-6 col-12">
							<div class="stats-tile">
								<div class="sale-icon shade-yellow">
									<i class="bi bi-cash-coin"></i>
								</div>
								<div class="sale-details">
									<h3 class="text-yellow" th:text="'Rs ' + ${totalPendingAmount}">0</h3>
									<p>Total Pending Amount</p>
								</div>
							</div>
						</div>
						<div class="col-xxl-3 col-sm-6 col-12">
							<div class="stats-tile">
								<div class="sale-icon shade-blue">
									<i class="bi bi-cash-coin"></i>
								</div>
								<div class="sale-details">
									<h3 class="text-blue" th:text="'Rs ' + ${totalBillAmount}">0</h3>
									<p>Total Bill Amount</p>
								</div>
							</div>
						</div>
					</div>
					<!-- Row end -->

					<div class="content-wrapper-scroll">
						<!-- Content wrapper start -->
						<div class="content-wrapper">
							<!-- Row start -->
							<div class="row">
								<div class="col-sm-12 col-12">

									<!-- Card start -->
									<div class="card">
										<div class="card-header">
											<div class="card-title">Cab Bill Reimbursement</div>
										</div>
										<div class="card-body">


											<form th:action="@{/user/submit_billreimbursement}"
												th:object="${billReimbursement}" method="post"
												enctype="multipart/form-data">
												<div class="row">

													<div class="col-xl-6 col-sm-12 col-12">
														<div class="mb-3">
															<label for="travelingFrom" class="form-label">Traveling
																From</label> <input type="text" class="form-control"
																th:field="*{travelingFrom}" id="travelingFrom"
																name="travelingFrom"
																placeholder="Enter Travelling from Address">
															<div class="invalid-feedback"></div>
														</div>
													</div>
													<div class="col-xl-6 col-sm-12 col-12">
														<div class="mb-3">
															<label for="travelingTo" class="form-label">Traveling
																To</label> <input type="text" class="form-control"
																th:field="*{travelingTo}" id="travelingTo"
																name="travelingTo"
																placeholder="Enter Travelling to Address">
															<div class="invalid-feedback"></div>
														</div>
													</div>



													<div class="col-xl-6 col-sm-12 col-12">
														<div class="mb-3">
															<label for="project" class="form-label">Project</label> <input
																th:field="*{project}" type="text" class="form-control"
																id="project" name="project"
																placeholder="Enter Project Name"
																oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
															<div class="invalid-feedback"></div>
														</div>
													</div>

													<!-- Date of Journey field -->
													<div class="col-xl-6 col-sm-12 col-12">
														<div class="mb-3">
															<label for="fromDate" class="form-label">Date of
																Journey</label> <input type="date" class="form-control"
																th:field="*{fromDate}" name="fromDate" id="fromDate"
																placeholder="Enter from date">
															<div class="invalid-feedback"></div>
														</div>
													</div>

													<div class="col-xl-6 col-sm-12 col-12">
														<div class="mb-3">
															<label for="whomToVisit" class="form-label">Whom
																to Visit</label> <input th:field="*{whomToVisit}" type="text"
																class="form-control" id="whomToVisit" name="whomToVisit"
																placeholder="Enter name whom to visit"
																oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
															<div class="invalid-feedback"></div>
														</div>
													</div>
													<!--  -->


													<div class="col-xl-6 col-sm-12 col-12">
														<div class="mb-3">
															<label for="billAmount" class="form-label">Bill
																Amount</label> <input th:field="*{billAmount}" type="text"
																class="form-control" id="billAmount" name="billAmount"
																placeholder="Enter bill amount"
																oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*)\./g, '$1');">
															<div class="invalid-feedback"></div>
														</div>
													</div>


													<!-- Upload Bill field -->
													<div class="card-body">
														<div class="mb-3">
															<label for="billFile" class="form-label">Upload
																Bill</label>
															<div
																class="d-flex align-items-center justify-content-between">
																<div
																	class="d-flex align-items-center col-xl-6 col-sm-10 col-10">
																	<input type="file" class="form-control me-2"
																		id="billFile" name="billFile" accept="application/pdf"
																		aria-describedby="inputGroupFileAddon04"
																		aria-label="Upload">
																	<div class="invalid-feedback"></div>
																</div>
																<div class="col-xl-6 col-sm-12 col-12 text-end">
																	<button type="submit" class="btn btn-success">Submit</button>
																</div>
															</div>
															<small class="text-danger">Only .pdf files less
																than 200 KB are allowed.</small>
														</div>
													</div>
												</div>
											</form>
										</div>
										<!-- Row end -->


									</div>
								</div>


								<!-- Card end -->



								<!-- Row start -->
								<div class="row">
									<div class="col-xxl-12  col-sm-12 col-12">

										<!-- Dropdown Filter -->
										<div>
											<label for="statusFilter">Filter by Status: </label> <select
												id="statusFilter">
												<option value="All">All</option>
												<option value="Pending">Pending</option>
												<option value="Approved">Approved</option>
												<option value="Rejected">Rejected</option>
											</select>
										</div>

										<br>

										<!-- Date Picker Filter -->
										<div>
											<label for="dateFilter">Filter by Month and Year: </label> <input
												type="month" id="dateFilter">
										</div>

										<br>



										<div class="card">
											<div class="card-body">

												<!-- Row start -->
												<div class="table-responsive">
													<table id="cabBillTable" class="table custom-table">
														<thead>
															<tr>
																<!-- <th>Name</th> -->
																<th>Traveling From</th>
																<th>Traveling To</th>
																<th>Project</th>

																<th>Date of Journey</th>
																<th>Whom to visit</th>
																<th>Bill Amount</th>
																<th>Status</th>
																<th>Actions</th>
																<!-- <th>View Bill</th> -->
															</tr>
														</thead>
														<tbody>
															<tr th:each="bill : ${employeeBills}"
																th:data-status="${bill.status}"
																th:data-date="${bill.fromDate}">

																<td th:text="${bill.travelingFrom}"></td>
																<td th:text="${bill.travelingTo}"></td>
																<td th:text="${bill.project}"></td>
																<td th:text="${bill.fromDate}"></td>
																<td th:text="${bill.whomToVisit}"></td>
																<td th:text="${bill.billAmount}"></td>
																<td th:text="${bill.status}"></td>
																<td><a class="edit-btn" href="#"
																	data-toggle="modal" data-target="#editModal"
																	th:data-id="${bill.id}"
																	th:data-traveling="${bill.travelingFrom}"
																	th:data-travelingto="${bill.travelingTo}"
																	th:data-project="${bill.project}"
																	th:data-date="${bill.fromDate}"
																	th:data-visit="${bill.whomToVisit}"
																	th:data-amount="${bill.billAmount}"
																	th:data-status="${bill.status}"
																	th:data-uploadbill="${bill.filePath}"> <i
																		class="bi bi-eye text-blue"></i>
																</a> <a th:if="${bill.status == 'Pending'}"
																	th:href="@{/user/delete_bill/{id}(id=${bill.id})}"
																	class="deleteRow"> <i class="bi bi-trash text-red"></i>
																</a> <a th:href="@{/user/pdfsubmitted/{id}(id=${bill.id})}"
																	target="_blank"><i class="bi bi-file-earmark-pdf"></i></a>
																	<a th:if="${bill.status == 'Rejected'}"> <a
																		href="#" data-bs-toggle="modal"
																		data-bs-target="#verticallyCentered"
																		th:data-id="${bill.id}" class="view-remarks-button">
																			<i class="bi bi-envelope-x text-red"></i>
																	</a>

																</a>
															</tr>


														</tbody>

													</table>
												</div>
												<!-- Row end -->

											</div>
										</div>

									</div>

								</div>
								<!-- Row end -->
								<!--  old working  -->

								<div th:if="${message}" class="alert alert-success">
									<p th:text="${message}"></p>
								</div>

								<div th:if="${error}" class="alert alert-danger">
									<p th:text="${error}"></p>
								</div>

								<div th:if="${errors}">
									<div class="alert alert-danger">
										<ul>
											<li th:each="entry : ${errors}" th:text="${entry.value}"></li>
										</ul>
									</div>
								</div>

								<!-- Edit Modal -->
								<div class="modal fade" id="editModal" data-bs-backdrop="static"
									data-bs-keyboard="false" tabindex="-1"
									aria-labelledby="editModalLabel" aria-hidden="true">
									<div class="modal-dialog modal-dialog-scrollable">
										<div class="modal-content">
											<div class="modal-header">
												<h5 class="modal-title" id="editModalLabel">Edit Bill
													Reimbursement</h5>
												<button type="button" class="btn-close"
													data-bs-dismiss="modal" aria-label="Close"></button>
											</div>
											<div class="modal-body">
												<form id="editForm" th:action="@{/user/update_bill}"
													method="post" th:object="${billReimbursement}"
													enctype="multipart/form-data">
													<input type="hidden" th:field="*{id}" id="editItemId" />

													<div class="form-group">
														<label for="editItemTravelingFrom">Traveling From</label>
														<input type="text" class="form-control"
															id="editItemTravelingFrom" th:field="*{travelingFrom}" />
													</div>
													<div class="form-group">
														<label for="editItemTravelingTo">Traveling To</label> <input
															type="text" class="form-control" id="editItemTravelingTo"
															th:field="*{travelingTo}" />
													</div>
													<div class="form-group">
														<label for="editItemProject">Project</label> <input
															type="text" class="form-control" id="editItemProject"
															th:field="*{project}" />
													</div>
													<div class="form-group">
														<label for="editItemDate">Date of Journey</label> <input
															type="text" class="form-control" id="editItemDate"
															th:field="*{fromDate}" required readonly />
													</div>
													<div class="form-group">
														<label for="editItemVisit">Whom to Visit</label> <input
															type="text" class="form-control" id="editItemVisit"
															th:field="*{whomToVisit}" required />
													</div>
													<div class="form-group">
														<label for="editItembillAmount">Bill Amount</label> <input
															type="text" class="form-control" id="editItembillAmount"
															th:field="*{billAmount}" required />
													</div>
													<div class="form-group">
														<label for="editItembillStatus">Status</label> <input
															type="text" class="form-control" id="editItembillStatus"
															th:field="*{status}" required readonly />
													</div>
													<div class="form-group">
														<label for="editItemFile">Upload Bill</label> <input
															type="file" class="form-control" id="editItemFile"
															name="billFile" />
													</div>
												</form>
											</div>
											<div class="modal-footer">
												<button type="button" class="btn btn-dark"
													data-bs-dismiss="modal">Close</button>
												<button type="button" class="btn btn-success"
													id="saveChangesButton" onclick="$('#editForm').submit();">Save
													changes</button>
											</div>
										</div>
									</div>
								</div>

								<!-- change password modal -->

								<div th:replace="Header.html::user-changePasswordmodal"></div>
								<!-- End  -->




								<!-- Rejection Remarks Modal -->
								<div class="modal fade" id="verticallyCentered" tabindex="-1"
									aria-labelledby="verticallyCenteredLabel" aria-hidden="true">
									<div class="modal-dialog modal-dialog-centered">
										<div class="modal-content">
											<div class="modal-header">
												<h5 style="color: Tomato;" class="modal-title"
													id="verticallyCenteredLabel">Reason for Rejection</h5>
												<button type="button" class="btn-close"
													data-bs-dismiss="modal" aria-label="Close"></button>
											</div>
											<div class="modal-body">
												<label for="remarks" class="form-label">Remarks</label>
												<textarea rows="5" cols="40" readonly></textarea>
											</div>
											<div class="modal-footer">
												<button type="button" class="btn btn-dark"
													data-bs-dismiss="modal">Close</button>
											</div>
										</div>
									</div>
								</div>

							</div>
							<!-- Content wrapper end -->

							<!-- App Footer start -->
							<div class="app-footer" th:insert="footer.html::footer"></div>
							<!-- App footer end -->

						</div>
						<!-- Content wrapper scroll end -->

					</div>
					<!-- *************
				************ Main container end *************
			************* -->



					<!-- Page wrapper end -->
					<form th:action="@{/logout}" method="post" id="logoutForm"
						name="logoutForm"></form>
					<!--  Required JavaScript Files -->
					<div th:replace="footer.html:: common-scripts"></div>



					<script>
						$(document)
								.ready(
										function() {
											// Edit modal setup
											$('#cabBillTable').DataTable({
												"paging" : true,
												"searching" : true,
												"ordering" : true,
												"info" : true
											});

											$('.edit-btn')
													.on(
															'click',
															function() {
																var id = $(this)
																		.data(
																				'id');
																var travelingFrom = $(
																		this)
																		.data(
																				'traveling');
																var travelingTo = $(
																		this)
																		.data(
																				'travelingto');
																var project = $(
																		this)
																		.data(
																				'project');
																var dateOfVisit = $(
																		this)
																		.data(
																				'date');
																var whomToVisit = $(
																		this)
																		.data(
																				'visit');
																var billAmount = $(
																		this)
																		.data(
																				'amount');
																var status = $(
																		this)
																		.data(
																				'status');

																$('#editItemId')
																		.val(id);
																$(
																		'#editItemTravelingFrom')
																		.val(
																				travelingFrom);
																$(
																		'#editItemTravelingTo')
																		.val(
																				travelingTo);
																$(
																		'#editItemProject')
																		.val(
																				project);
																$(
																		'#editItemDate')
																		.val(
																				dateOfVisit);
																$(
																		'#editItemVisit')
																		.val(
																				whomToVisit);
																$(
																		'#editItembillAmount')
																		.val(
																				billAmount);
																$(
																		'#editItembillStatus')
																		.val(
																				status);
																$('#editModal')
																		.modal(
																				'show');
															});

											// Reset edit modal on close
											$('#editModal').on(
													'hidden.bs.modal',
													function() {
														$('#editForm').trigger(
																'reset');
													});

											$('.deleteRow')
													.on(
															'click',
															function(event) {
																event
																		.preventDefault();
																var url = $(
																		this)
																		.attr(
																				'href');
																if (confirm('Are you sure you want to delete this bill?')) {
																	window.location.href = url;
																}
															});
										});
					</script>



					 <script>
						document.getElementById('statusFilter')
								.addEventListener('change', function() {
									filterRows();
								});

						document.getElementById('dateFilter').addEventListener(
								'change', function() {
									filterRows();
								});

						function filterRows() {
							var statusFilter = document
									.getElementById('statusFilter').value;
							var dateFilter = document
									.getElementById('dateFilter').value;

							var rows = document
									.querySelectorAll('#cabBillTable tbody tr');

							rows
									.forEach(function(row) {
										var status = row
												.getAttribute('data-status');
										var date = row
												.getAttribute('data-date');
										var rowMonthYear = date.substring(0, 7); // Extract "YYYY-MM" format

										var statusMatch = (statusFilter === 'All' || status === statusFilter);
										var dateMatch = (dateFilter === '' || rowMonthYear === dateFilter);

										if (statusMatch && dateMatch) {
											row.style.display = '';
										} else {
											row.style.display = 'none';
										}
									});
						}
					</script>

					<script>
						document
								.addEventListener(
										"DOMContentLoaded",
										function() {
											// Set the Date of Journey field limits dynamically
											/* const fromDate = document
													.getElementById('fromDate');
											const currentDate = new Date()
													.toISOString().split("T")[0];
											const minDate = new Date();
											minDate
													.setDate(minDate.getDate() - 30);

											fromDate.max = currentDate;
											fromDate.min = minDate
													.toISOString().split("T")[0];
 */
											// Custom validation for file size and type
											document
													.getElementById('billFile')
													.addEventListener(
															'change',
															function() {
																const file = this.files[0];
																if (file) {
																	if (file.size > 200 * 1024) {
																		alert('File size should be less than 200 KB.');
																		this.value = ''; // Reset the input
																	} else if (file.type !== 'application/pdf') {
																		alert('Only .pdf files are allowed.');
																		this.value = ''; // Reset the input
																	}
																}
															});
										});
					</script>

					<script>
						$(document)
								.ready(
										function() {
											$('form')
													.on(
															'submit',
															function(e) {
																e
																		.preventDefault();

																var formData = new FormData(
																		this);

																$
																		.ajax({
																			type : 'POST',
																			url : $(
																					this)
																					.attr(
																							'action'),
																			data : formData,
																			processData : false,
																			contentType : false,
																			success : function(
																					response) {
																				// On success, you can redirect or display a success message
																				window.location.href = response.redirectUrl;
																			},
																			error : function(
																					xhr) {
																				var errors = xhr.responseJSON;

																				// Clear previous error messages
																				$(
																						'.invalid-feedback')
																						.text(
																								'');
																				$(
																						'.is-invalid')
																						.removeClass(
																								'is-invalid');

																				// Loop through errors and display them
																				$
																						.each(
																								errors,
																								function(
																										key,
																										value) {
																									var input = $('[name='
																											+ key

    // Event listener for the button to open the modal
    $('.view-remarks-button').click(function() {

        $.ajax({

                // Add the CSRF token to the request header
                /* xhr.setRequestHeader(csrfHeader, csrfToken); */

            success: function(remarks) {
                // Set the remarks in the textarea
                $('#verticallyCentered textarea').val(remarks).prop('readonly', true);
            },
            error: function(xhr, status, error) {
                alert('An error occurred: ' + xhr.responseText);
            }
        });
    });
});
