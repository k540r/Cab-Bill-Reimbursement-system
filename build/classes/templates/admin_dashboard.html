<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<!-- Required meta tags -->
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">

<!-- Meta -->
<link rel="shortcut icon"
	href="https://bisag-n.gov.in/images/logos/bisag_logo.png">



<!-- Title -->
<title>BISAG-N Admin Dashboard</title>

<!-- *************
     ************ Common Css Files *************
     ************ -->

<!-- Animated css -->
<th:block th:replace="Header.html::allcsslink"></th:block>

<style>
#chartdiv {
	width: 100%;
	height: 500px;
}

#yearSelect {
	font-size: 1rem; /* Larger font size */
	padding: 0.75rem; /* Larger padding */
	border-radius: 0.375rem; /* Rounded corners */
	border: 2px solid #007bff; /* Blue border */
	background-color: #f8f9fa; /* Light background color */
	color: #495057; /* Text color */
}

#yearSelect option {
	background-color: #e9ecef; /* Light grey background for options */
	color: #495057; /* Text color for options */
}

#yearSelect option:hover {
	background-color: #ced4da; /* Darker grey background on hover */
}
</style>
<!-- Resources -->
<script src="https://cdn.amcharts.com/lib/5/index.js"></script>
<script src="https://cdn.amcharts.com/lib/5/xy.js"></script>
<script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>
</head>

<body>

	<!-- Loading wrapper start -->
	<div id="loading-wrapper">
		<div class="spinner">
			<div class="line1"></div>
			<div class="line2"></div>
			<div class="line3"></div>
			<div class="line4"></div>
			<div class="line5"></div>
			<div class="line6"></div>
		</div>
	</div>
	<!-- Loading wrapper end -->

	<!-- Page wrapper start -->
	<div class="page-wrapper">

		<!-- Sidebar wrapper start -->
		<nav class="sidebar-wrapper">

			<!-- Sidebar brand starts -->
			<div class="sidebar-brand">
				<a href="commonDash" class="logo"> <img
					th:src="@{/assets/images/bisag_logo.png}" 
					alt="Admin Dashboards" />
				</a>
			</div>
			<!-- Sidebar brand starts -->

			<!-- Sidebar menu starts -->
			<div class="sidebar-menu"
				th:insert="Header.html::Admin-sidemnubar"></div>
			<!-- Sidebar menu ends -->

		</nav>
		<!-- Sidebar wrapper end -->

		<!-- *************
				************ Main container start *************
			************* -->
		<div class="main-container">

			<!-- Page header starts -->
			<div class="page-header" th:replace="Header.html::admin-page-header"></div>
			<!-- Page header ends -->

			<!-- Content wrapper scroll start -->
			<div class="content-wrapper-scroll">

				<!-- Content wrapper start -->
				<div class="content-wrapper">

					<!-- Row start -->
					<div class="row">
						<div class="col-xxl-3 col-sm-6 col-12">
							<div class="stats-tile">
								<div class="sale-icon shade-red">
									<i class="bi bi-pie-chart"></i>
								</div>
								<div class="sale-details">
									<h3 class="text-red" th:text="${totalBillCount}">0</h3>
									<p>Bills</p>
								</div>
							</div>
						</div>
						<div class="col-xxl-3 col-sm-6 col-12">
							<div class="stats-tile">
								<div class="sale-icon shade-blue">
									<i class="bi bi-person-bounding-box"></i>
								</div>
								<div class="sale-details">
									<h3 class="text-blue" th:text="${totalEmp}">0</h3>
									<p>Employee</p>
								</div>
							</div>
						</div>
						<div class="col-xxl-3 col-sm-6 col-12">
							<div class="stats-tile">
								<div class="sale-icon shade-green">
									<i class="bi bi-box-seam"></i>
								</div>
								<div class="sale-details">
									<h3 class="text-green" th:text="${approvedEmp}">0</h3>
									<p>Approved</p>
								</div>
							</div>
						</div>
						<div class="col-xxl-3 col-sm-6 col-12">
							<div class="stats-tile">
								<div class="sale-icon shade-yellow">
									<i class="bi bi-exclamation-diamond"></i>
								</div>
								<div class="sale-details">
									<h3 class="text-yellow" th:text="${pendingEmp}">0</h3>
									<p>Pending</p>
								</div>
							</div>
						</div>
					</div>
					<!-- Row end -->

					<!-- Row start -->
					<div class="row">
						<div class="col-xxl-12  col-sm-12 col-12">

							<div class="card">
								<div class="card-body">

									<!-- Row start -->
									<div class="table-responsive">
										<table id="registerTable" class="table custom-table">
											<thead>
												<tr>
												    <th style="display:none;">Created at</th>
													<th>Full Name</th>
													<th>Email</th>
													<th>Job Title</th>
													<th>Contact Number</th>
													<th>Joining Date</th>
													<th>Agency</th>
													<th>Department</th>
													<th>Reporting Personnel</th>
													<th class="actions">Actions</th>
												</tr>
											</thead>
											<tbody>
												<tr th:each="employee : ${allEmployee}">
												    <td style="display:none;" th:text="${employee.created_at}"></td>
													<td th:text="${employee.Full_name}"></td>
													<td th:text="${employee.email}"></td>
													<td th:text="${employee.jobTitle}"></td>
													<td th:text="${employee.contact_number}"></td>
													<td th:text="${employee.joiningDate}"></td>
													<td th:text="${employee.agency}"></td>
													<td th:text="${employee.department}"></td>
													<td th:text="${employee.reporting_per}"></td>
													<td><a
														th:href="@{/admin/registeredemployee(id=${employee.id})}"
														class="viewRow"> <i class="bi bi-eye text-blue"></i>
													</a></td>
												</tr>
											</tbody>
										</table>
									</div>
									<!-- Row end -->

								</div>
							</div>

						</div>

					</div>
					<!-- Row end -->
					
					<!-- Row start -->
					<div class="row">
						
						<div class="container mt-5">

							<h4>Select Year</h4>
							<div class="mb-3">
								<!-- Dropdown for Year Selection -->
								<select id="yearSelect">
									<option value="">Select Year</option>
									<th:block th:each="year, iterStat : ${years}">
										<option th:value="${year}" th:text="${year}"
											th:selected="${iterStat.index == 0}"></option>
									</th:block>
								</select>
							</div>

							<!-- Container for legend and scroll instructions -->
							<div
								style="display: flex; flex-direction: column; align-items: flex-end; margin-bottom: 10px;">
								<!-- Legend for the graph -->
								<div style="display: flex; align-items: center;">
									<p
										style="color: #33D17A ; margin: 0; margin-right: 20px; font-weight: bold;">→
										Approved</p>
									<p style="color: #F6D32D; margin: 0; font-weight: bold;">→
										Pending</p>
								</div>
								<!-- Scroll instructions -->
								<p style="color: #333333; margin: 0; margin-top: 5px;">Scroll
									horizontally to view more details.</p>
							</div>


						</div>

						<!-- Chart Container -->
						<div id="chartdiv"></div>

					</div>

				</div>
				<!-- Row end -->
			</div>




			<!-- Content wrapper end -->

			<!-- App Footer start -->
			<div class="app-footer" th:insert="footer.html::footer"></div>
			<!-- App footer end -->

		</div>
		<!-- Content wrapper scroll end -->

	</div>
	<!-- *************
				************ Main container end *************
			************* -->

	</div>
	<!-- Page wrapper end -->


	<div th:replace="Header.html::changePasswordmodal"></div>

	<form th:action="@{/logout}" method="post" id="logoutForm"
		name="logoutForm"></form>
	<!-- *************
			************ Required JavaScript Files *************
		************* -->
	<!-- Required jQuery first, then Bootstrap Bundle JS -->
	<script th:src="@{/assets/js/jquery.min.js}"></script>
	<script th:src="@{/assets/js/bootstrap.bundle.min.js}"></script>
	<script th:src="@{/assets/js/modernizr.js}"></script>
	<script th:src="@{/assets/js/moment.js}"></script>

			************ Vendor Js Files *************
		************* -->

	<div th:replace="footer.html:: common-scripts"></div>

	<script>
am5.ready(function() {
    // Create root element
    var root = am5.Root.new("chartdiv");

    // Set themes
    root.setThemes([
        am5themes_Animated.new(root)
    ]);

    // Create chart
    var chart = root.container.children.push(am5xy.XYChart.new(root, {
        panX: true,
        panY: false,
        wheelX: "panX",
        wheelY: "zoomX",
        paddingTop: 0,
        paddingBottom: 0
    }));

    // Add scrollbar
    chart.set("scrollbarX", am5.Scrollbar.new(root, {
        orientation: "horizontal" // Change scrollbar to horizontal
    }));

    // Create axes
    var xRenderer = am5xy.AxisRendererX.new(root, {
        minGridDistance: 70,
        minorGridEnabled: true
    });

    var xAxis = chart.xAxes.push(am5xy.CategoryAxis.new(root, {
        categoryField: "month",
        renderer: xRenderer,
        tooltip: am5.Tooltip.new(root, {
            themeTags: ["axis"],
            animationDuration: 200
        })
    }));

    xRenderer.grid.template.setAll({
        location: 1
    });

    var yAxis = chart.yAxes.push(am5xy.ValueAxis.new(root, {
        min: 0,
        renderer: am5xy.AxisRendererY.new(root, {
            strokeOpacity: 0.1
        })
    }));

    // Add series for Pending (stacked)
    var series0 = chart.series.push(am5xy.ColumnSeries.new(root, {
        name: "Pending",
        xAxis: xAxis,
        yAxis: yAxis,
        valueYField: "pendingAmount", // Change to valueYField for vertical orientation
        categoryXField: "month",       // Change to categoryXField for vertical orientation
        stacked: true,                 // Enable stacking
        tooltip: am5.Tooltip.new(root, {
            labelText: "Pending Rs : {valueY}" // Update tooltip field
        })
    }));

    series0.columns.template.setAll({
        width: am5.percent(80), // Adjust width for vertical stacking
        tooltipY: 0,
        strokeOpacity: 0,
        fill: am5.color("#F6D32D")
    });

    // Add series for Approved (stacked)
    var series1 = chart.series.push(am5xy.ColumnSeries.new(root, {
        name: "Approved",
        xAxis: xAxis,
        yAxis: yAxis,
        valueYField: "approvedAmount", // Change to valueYField for vertical orientation
        categoryXField: "month",        // Change to categoryXField for vertical orientation
        stacked: true,                  // Enable stacking
        tooltip: am5.Tooltip.new(root, {
            labelText: "Approved Rs : {valueY}" // Update tooltip field
        })
    }));

    series1.columns.template.setAll({
        width: am5.percent(80), // Adjust width for vertical stacking
        tooltipY: 0,
        strokeOpacity: 0,
        fill: am5.color("#33D17A")
    });

    var cursor = chart.set("cursor", am5xy.XYCursor.new(root, {}));

    // Function to convert month number to month name
    function getMonthName(monthNumber) {
        const months = [
            "Jan", "Feb", "Mar", "Apr", "May", "Jun",
            "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"
        ];
        return months[parseInt(monthNumber, 10) - 1];
    }

    // Function to fetch chart data based on year
    function fetchChartData(year) {
        var contextPath = window.location.pathname.split('/')[1]; // Extract context path
        var url = `/${contextPath}/admin/chart/data?year=${year}`;

        fetch(url)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                updateChart(data);
            })
            .catch(error => {
                console.error('Error fetching chart data:', error);
            });
    }

    // Function to update the chart with new data
    function updateChart(data) {
   
    	
    	
    	
        // Convert month numbers to month names
        const months = data.map(item => {
            const monthNumber = item.month.split('-')[1]; // Extract month number
            return getMonthName(monthNumber);
        });

        const pendingAmounts = data.map(item => item.pendingAmount);
        const approvedAmounts = data.map(item => item.approvedAmount);

        xAxis.data.setAll(months.map(month => ({ month }))); // Use xAxis for months
        series0.data.setAll(months.map((month, index) => ({
            month: month,
            pendingAmount: pendingAmounts[index]
        })));
        series1.data.setAll(months.map((month, index) => ({
            month: month,
            approvedAmount: approvedAmounts[index]
        })));
    }

    // Event listener for year selection
    document.getElementById('yearSelect').addEventListener('change', function() {
        const year = this.value;
        if (year) {
            fetchChartData(year);
        } else {
            xAxis.data.setAll([]);
            series0.data.setAll([]);
            series1.data.setAll([]);
        }
    });

    // Automatically select the first year and fetch data
    document.addEventListener('DOMContentLoaded', function() {
        var yearSelect = document.getElementById('yearSelect');
        var firstOption = yearSelect.options[1]; // Skip the first option ("Select Year")

        if (firstOption) {
            yearSelect.value = firstOption.value;
            fetchChartData(firstOption.value);
        }
    });
});
</script>
