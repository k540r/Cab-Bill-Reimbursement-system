					<script>

            const table = document.getElementById("projectTable");
            const rows = table.querySelectorAll("tbody tr");
            
            rows.forEach((row, index) => {
                    row.querySelector(".row-id").textContent = index + 1; // Starting ID from 1
            });
            
		 });
		</script>
					


<script>
