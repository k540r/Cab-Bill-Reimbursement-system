		<script>
			var token = $("meta[name='_csrf']").attr("content");
			var header = $("meta[name='_csrf_header']").attr("content");
			$(document).ajaxSend(function(e, xhr, options) {
				xhr.setRequestHeader(header, token);
			});
			$(document).ready(function() {
				newReg_empl_list();

			});
			function newReg_empl_list() {
				$.post("new_empl_list", {}, function(j) {
					console.log(j)
					new_empl_list(j)

					// 		 if(j.enabled==true){
					// 			 var data= JSON.stringify(j.rows);
					// 			 console.log(data)

					// 		 }
				});
			}

			function new_empl_list(j) {
				$('#employeeTable')
						.DataTable(
								{
									data : j, // Assuming j.rows contains the data to be displayed
									destroy : true, // Destroy existing DataTable instance before reinitializing
									lengthMenu : [ 5, 10, 25 ], // Option to control the number of records per page
									pageLength : 10, // Default number of records per page
									dom : 'Bfrtip', // Define the placement of table elements (buttons in this case)
									buttons : [], // Array to hold buttons (none specified in the example)
									ordering : true,
									columns : [
											{
												"data" : null, // This column is not bound to data
												"render" : function(data, type,
														row, meta) {
													return meta.row + 1; // Serial number based on row index
												}
											},

											{
												"data" : "first_name"
											},
											{
												"data" : "jobTitle"
											},
											{
												"data" : "contact_number"
											},
											{
												"data" : "department"
											},
											{
												"data" : "joiningDate"
											},
											{
												"data" : "reporting_per"
											},
											{
												"data" : "agency"
											},
											{

												"data" : "status",
												/* "visible" : false */
												"render" : function(data, type,
														row) {
													if (data == 0) {
														return "Pending";
													} else if (data == 1) {
														return "Approved";
													} else if (data == -1) {
														return "Rejected";
													} else {
														return "Unknown";
													}
												}

											// Hide this column from the display
											},
											{
												"data" : "",
												render : function(data, type,
														row) {
													var status = row.status; // Access the status directly from the row
													var deleteButton = '';
													if (status == '0') {
														deleteButton = '<a href="#" class="deleteRow" value="' + row.id + '"><i class="bi bi-trash text-red"></i></a>';
													}
													var buttons = '<a href="#" class="appRow" data-bs-toggle="modal" data-bs-target="#modalDark" value="' + row.id + '"><i class="bi bi-check2-circle text-green"></i></a>'
															+ '<a href="#" class="viewRow" value="' + row.id + '"><i class="bi bi-eye text-blue"></i></a>'
															+ deleteButton;
													return buttons;
												}
											} ],
									order : [ [ 0, 'desc' ] ]
								// Always sort by the second column (first_name) in decending order
								});
			}
		</script>

		<script>
			// jQuery click event handler for deletion
			$(document).on('click', '.deleteRow', function() {
				var employeeId = $(this).attr('value');

				// Populate employee ID in the modal
				$('#employeeIdSpan').text(employeeId);

				// Show the delete confirmation modal
				$('#modalDelete').modal('show');

				// Handle delete confirmation button click
				$('#confirmDeleteBtn').off('click').on('click', function() {
			     	var key = "${_csrf.parameterName}";
			     	var value = "${X-Csrf-Token}";
					// Make an AJAX request to the delete endpoint
					$.post("delete",{newid:employeeId}, function(response) {
// 					$.ajax({
// 						url : 'delete?'+key+"=" + value,
// 						type : 'POST',
// 						success : function(response) {
							if (response.status === 'catches') {
								alert(response.message);
								window.location.href = 'reg_employee';
							} else if (response.status === 'success') {
								alert(response.message);
								window.location.href = 'reg_employee';

							}

						
					});

		<script>
			$(document)
					.ready(
							function() {

								// Apply light yellow background to all options within the updateForm select elements
								$('#updateForm select option').each(function() {
									$(this).css('background-color', '#ffffe0');
								});

								// Apply light grey background to all the updateForm select elements
								$('#updateForm select').each(function() {
									$(this).css('background-color', '#DCDCDC');
								});

								function updateDropdownOptions(status) {
									const statusSelect = $('#update_status');
									statusSelect
											.find('option')
											.each(
													function() {
														if (status === '1') {
															// Hide Pending and Rejected options if Approved is selected
															if ($(this).val() === '0'
																	|| $(this)
																			.val() === '-1') {
																$(this).hide();
															} else {
																$(this).show();
															}
														} else if (status === '-1') {
															// Remove Approved option if Rejected is selected
															if ($(this).val() === '1'
																	|| $(this)
																			.val() === '0') {
																$(this)
																		.remove();
															} else {
																$(this).show();
															}
														} else if (status === '0') {
															// Show all options and move Pending to the top if Pending is selected
															$(this).show();
															if ($(this).val() === '0') {
																$(this)
																		.prependTo(
																				statusSelect);
															}
														} else {
															// Show all options if any other status is selected
															$(this).show();
														}
													});
								}

								$(document)
										.on(
												'click',
												'.appRow',
												function(event) {
													event.preventDefault(); // Prevent default form submission
													var employeeId = $(this)
															.attr('value');

													// AJAX request to get employee details
													$
															.ajax({
																url : 'employee_detail?id='
																		+ encodeURIComponent(employeeId),
																type : 'GET',
																success : function(
																		data) {
																	// Populate the modal with employee and login information
																	$(
																			'#full_name')
																			.val(
																					data.full_name);
																	$('#empId')
																			.val(
																					employeeId); // Ensure this is the encrypted ID
																	$('#role')
																			.val(
																					data.role);
																	$('#enable')
																			.val(
																					data.enable ? 'Active'
																							: 'Inactive');

																	let statusText;
																	let statusValue = data.status;
																	switch (statusValue) {
																	case '0':
																		statusText = 'Pending';
																		break;
																	case '1':
																		statusText = 'Approved';
																		break;
																	case '-1':
																		statusText = 'Rejected';
																		break;
																	}
																	$('#status')
																			.val(
																					statusText);
																	
																	const isUser = data.role === 'USER'; // Check if the user is an admin
																	const isAdmin = data.role === 'ADMIN'; // Check if the user is an admin
																	if (isAdmin) {
																		$(
																				'#adminWarning')
																				.show();
																		$(
																				'#update_role')
																				.prop(
																						'disabled',
																						true);
																		$(
																				'#update_enable')
																				.prop(
																						'disabled',
																						true);
																		$(
																				'#update_status')
																				.prop(
																						'disabled',
																						true);
																	} else {
																		$(
																				'#adminWarning')
																				.hide();
																		$(
																				'#update_role')
																				.prop(
																						'disabled',
																						false);
																		$(
																				'#update_enable')
																				.prop(
																						'disabled',
																						false);
																		$(
																				'#update_status')
																				.prop(
																						'disabled',
																						false);

																	}
																	updateRoleDropdown(isAdmin,isUser); // Update role dropdown visibility

																	// Reset and update the dropdown options based on the current status
																	resetDropdownOptions(statusValue);
																	updateDropdownOptions(statusValue);

																	updateEnableDropdown(data.enable); // Update enable dropdown options based on enable status

																	// Set form action dynamically
																	$(
																			'#updateForm')
																			.attr(
																					'action',
																					'updateStatusRole?id='
																							+ encodeURIComponent(employeeId));

																	// Show the modal
																	$(
																			'#modalDark')
																			.modal(
																					'show');
																},
																error : function() {
																	alert("Something Went Wrong");
																}
															});
												});

								function updateRoleDropdown(isAdmin,isUser) {
									const roleSelect = $('#update_role');
									roleSelect.empty(); // Clear existing options
									if (isAdmin) {
										// Add only "ADMIN" option if the user is an admin
										roleSelect
												.append('<option value="ADMIN">Admin</option>');
										roleSelect
												.append('<option value="MANAGER">Manager</option>');
										roleSelect
										        .append('<option value="USER">User</option>');
									} else {
										// Add both "USER" and "ADMIN" options if the user is not an admin
										if(isUser){
										roleSelect
												.append('<option value="USER">User</option>');
										roleSelect
										        .append('<option value="MANAGER">Manager</option>');
										roleSelect
												.append('<option disabled value="ADMIN">Admin</option>');
										}
										else{
											roleSelect
									        .append('<option value="MANAGER">Manager</option>');
		
											roleSelect
											.append('<option value="USER">User</option>');
									
									roleSelect
											.append('<option disabled value="ADMIN">Admin</option>');
										}
											}
										
									// Apply light yellow background to new options
									$('#update_role option').each(
											function() {
												$(this).css('background-color',
														'#ffffe0');
											});
								}

								function updateEnableDropdown(isEnabled) {
									const enableSelect = $('#update_enable');
									enableSelect.empty(); // Clear existing options
									if (isEnabled) {
										enableSelect
												.append('<option value="true">Active</option>');
										enableSelect
												.append('<option value="false">Inactive</option>');
									} else {
										enableSelect
												.append('<option value="false">Inactive</option>');
										enableSelect
												.append('<option value="true">Active</option>');
									}
									// Apply light yellow background to new options
									$('#update_enable option').each(
											function() {
												$(this).css('background-color',
														'#ffffe0');
											});
								}

								function resetDropdownOptions(currentStatus) {
									const statusSelect = $('#update_status');
									statusSelect.empty();
									if (currentStatus === '0') {
										// Append Pending first if the current status is Pending
										statusSelect
												.append('<option value="0">Pending</option>');
										statusSelect
												.append('<option value="1">Approved</option>');
										statusSelect
												.append('<option value="-1">Rejected</option>');
									} else {
										// Append options in the default order
										statusSelect
												.append('<option value="1">Approved</option>');
										statusSelect
												.append('<option value="0">Pending</option>');
										statusSelect
												.append('<option value="-1">Rejected</option>');
									}

									// Apply light yellow background to new options
									$('#update_status option').each(
											function() {
												$(this).css('background-color',
														'#ffffe0');
											});
								}

								$('#updateForm')
										.submit(
												function(event) {
													event.preventDefault(); // Prevent default form submission

													var form = $(this);
													var url = form
															.attr('action');
													var formData = form
															.serialize();

													$
															.ajax({
																url : url,
																type : 'POST',
																data : formData,
																success : function(
																		response) {
																	alert('Data Updated Successfully');
																	$(
																			'#modalDark')
																			.modal(
																					'hide');
																	location
																			.reload(); // Optionally reload the page to reflect changes
																},
																error : function() {
																	alert('Failed To Update Employee Details.');
																}
															});
												});
							});
		</script>
</body>

</html>
