<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no" name="viewport">
  <title>Forgot Password</title>

  <!-- General CSS Files -->
  <link rel="stylesheet" href="assets/modules/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/modules/fontawesome/css/all.min.css">

  <!-- CSS Libraries -->

  <!-- Template CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/components.css">

<script>
  function handleInput(input, index) {
    var maxLength = parseInt(input.getAttribute('maxlength'));
    if (input.value.length === maxLength) {
      if (index < 4) {
        document.getElementById('otp' + (index + 1)).focus();
      }
    } else if (input.value.length === 0) {
      if (index > 1) {
        document.getElementById('otp' + (index - 1)).focus();
      }
    }
  }
</script>

<!-- /END GA --></head>

<body>
  <div id="app">
    <section class="section">
      <div class="container">
        <div class="row align-items-center" style="margin-top: 80px;">
          <div class="col-md-6 d-flex justify-content-start">
            <div class="d-none d-md-block">
              <img src="assets/img/otp.png" alt="logo" class="img-fluid" style="max-width: 100%;">
            </div>
          </div>
          
          <div class="col-md-6 d-flex flex-column">
            <div class="login-brand align-self-center">
              <img src="assets/img/bisag_logo.png" alt="logo" width="300" height="180">
            </div>

            <div class="card card-primary align-self-center" style="width: 80%;">
              <div class="card-header"><h4>Forgot Password</h4></div>
              <div class="card-body">
              
                <div class="form-group">
                  <label for="contact_number">Contact Number</label>
                  <div class="input-group">
                    <input id="contact_number" type="tel" class="form-control" name="phone_number" oninput="this.value = this.value.replace(/[^0-9]/g, '').substring(0,15);">
                    <div class="input-group-append">
                      <button class="btn btn-primary" type="button">Send OTP</button>
                    </div>
                  </div>
                </div>

                <div class="form-group">
                  <label for="otp">Enter OTP</label>
                  <div class="row">
                    <div class="form-group col-3 mb-0">
                      <input id="otp1" type="text" class="form-control otp-input" name="otp1" maxlength="1" oninput="handleInput(this, 1)">
                    </div>
                    <div class="form-group col-3 mb-0">
                      <input id="otp2" type="text" class="form-control otp-input" name="otp2" maxlength="1" oninput="handleInput(this, 2)"> 
                    </div>
                    <div class="form-group col-3 mb-0">
                      <input id="otp3" type="text" class="form-control otp-input" name="otp3" maxlength="1" oninput="handleInput(this, 3)"> 
                    </div>
                    <div class="form-group col-3 mb-0">
                      <input id="otp4" type="text" class="form-control otp-input" name="otp4" maxlength="1" oninput="handleInput(this, 4)"> 
                    </div>
                  </div>
                </div>
                
                <div class="form-group">
                  <button href="forgot-password.html" type="submit" class="btn btn-primary btn-lg btn-block" tabindex="4">Verify OTP</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- General JS Scripts -->
  <script src="assets/modules/jquery.min.js"></script>
  <script src="assets/modules/popper.js"></script>
  <script src="assets/modules/tooltip.js"></script>
  <script src="assets/modules/bootstrap/js/bootstrap.min.js"></script>
  <script src="assets/modules/nicescroll/jquery.nicescroll.min.js"></script>
  <script src="assets/modules/moment.min.js"></script>
  <script src="assets/js/stisla.js"></script>
  
  <!-- JS Libraies -->

  <!-- Page Specific JS File -->
  
  <!-- Template JS File -->
  <script src="assets/js/scripts.js"></script>
  <script src="assets/js/custom.js"></script>
</body>
</html>
