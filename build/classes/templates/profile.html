<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Employee Profile</title>

<!-- Bootstrap CSS -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>
.profile-card {
	max-width: 850px;
	margin: auto;
}

.form-control, .form-select {
	height: 45px;
	font-size: 16px;
	border: 1px solid #000 !important;
}

.profile-img-top-right {
	position: absolute;
	top: 20px;
	right: 20px;
	width: 50px;
	height: 50px;
	object-fit: cover;
	border-radius: 50px;
	border: 2px solid #dee2e6;
	background: #fff;
	pointer-events: none;
	cursor: default;
}

.profile-img-editable {
	pointer-events: auto;
	cursor: pointer;
}

/* Spacer height equals image height + margin */
.image-spacer {
	height: 20px;
}
</style>
</head>

<body>

	<div class="container py-5">
		<div class="card shadow-sm profile-card">

			<div class="card-header bg-primary text-white">
				<h5 class="mb-0 text-center">Employee Profile</h5>
			</div>

			<div class="card-body position-relative">

				<!-- PROFILE IMAGE -->
				<img th:src="@{${profilePicturePath}}" id="profileImage"
					class="profile-img-top-right" alt="Profile Image"> <input
					type="file" id="imageInput" name="profilePicture" accept="image/*"
					class="d-none">


				<form id="profileForm" th:object="${emp}"
					th:action="@{profileupdated}" method="post">

					<!-- Hidden employee ID -->
					<input type="hidden" th:field="*{id}">

					<!-- CSRF -->
					<input type="hidden" th:name="${_csrf.parameterName}"
						th:value="${_csrf.token}" th:if="${_csrf != null}" />

					<!-- 🔽 RESERVED SPACE FOR IMAGE (TWO ROWS HEIGHT) -->
					<div class="row mb-3">
						<div class="col-12 image-spacer"></div>
					</div>

					<!-- FORM FIELDS -->
					<div class="row g-3">

						<div class="col-md-6">
							<label class="form-label">Full Name</label> <input type="text"
								th:field="*{full_name}" class="form-control" readonly>
						</div>

						<div class="col-md-6">
							<label class="form-label">Mobile</label> <input type="text"
								th:field="*{contact_number}" class="form-control" readonly>
						</div>

						<div class="col-md-6">
							<label class="form-label">Email</label> <input type="text"
								th:field="*{email}" class="form-control" readonly>
						</div>

						<div class="col-md-6">
							<label class="form-label">Date of Birth</label> <input
								type="text" th:field="*{dateOfBirth}" class="form-control"
								readonly>
						</div>

						<div class="col-md-6">
							<label class="form-label">Address</label> <input type="text"
								th:field="*{currentAddress}" class="form-control" readonly>
						</div>

						<div class="col-md-6">
							<label class="form-label">Hometown</label> <input type="text"
								th:field="*{hometown}" class="form-control view-mode" readonly>

							<!-- EDIT MODE -->
							<select th:field="*{hometown}"
								class="form-select edit-mode d-none" disabled>
								<option value="">-- Select Hometown --</option>
								<option th:each="h : ${dropdownItemsHometown}"
									th:value="${h.name}" th:text="${h.name}"></option>
							</select>
						</div>


						<div class="col-md-6">
							<label class="form-label">Joining Date</label> <input type="date"
								th:field="*{joiningDate}" class="form-control" readonly>
						</div>

						<div class="col-md-6">
							<label class="form-label">Agency</label> <input type="text"
								th:field="*{agency}" class="form-control view-mode" readonly>

							<!-- EDIT MODE -->
							<select th:field="*{agency}" class="form-select edit-mode d-none"
								disabled>
								<option value="">-- Select Agency --</option>
								<option th:each="a : ${dropdownItemsAgency}"
									th:value="${a.name}" th:text="${a.name}"></option>
							</select>
						</div>


						<div class="mt-4 text-center">
							<button id="editBtn" type="button" class="btn btn-primary px-4">Edit
								Profile</button>
							<button id="saveBtn" type="submit"
								class="btn btn-success px-4 d-none">Save</button>
						</div>

					</div>
				</form>
			</div>

		</div>
	</div>

	<!-- Buttons -->

	<script>
document.addEventListener("DOMContentLoaded", function () {

    const editBtn = document.getElementById("editBtn");
    const saveBtn = document.getElementById("saveBtn");
    const profileImage = document.getElementById("profileImage");
    const imageInput = document.getElementById("imageInput");

    let editMode = false;

    editBtn.addEventListener("click", function () {
        editMode = true;

        /* Enable all normal inputs */
        document.querySelectorAll("input:not([type=hidden])")
            .forEach(el => el.removeAttribute("readonly"));

        /* Disable view-mode inputs */
        document.querySelectorAll(".view-mode").forEach(el => {
            el.classList.add("d-none");
            el.setAttribute("disabled", true);
        });

        /* Enable dropdowns */
        document.querySelectorAll(".edit-mode").forEach(el => {
            el.classList.remove("d-none");
            el.removeAttribute("disabled");
        });

        /* Enable image change */
        profileImage.classList.add("profile-img-editable");

        editBtn.classList.add("d-none");
        saveBtn.classList.remove("d-none");
    });

    profileImage.addEventListener("click", function () {
        if (editMode) imageInput.click();
    });

    imageInput.addEventListener("change", function () {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = e => profileImage.src = e.target.result;
            reader.readAsDataURL(file);
        }
    });

});
</script>

</body>
</html>
