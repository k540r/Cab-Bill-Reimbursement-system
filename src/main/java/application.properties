spring.application.name=RBAC

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
# DataSource configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/cab1
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate configuration (optional but recommended)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.springframework.security=DEBUG

server.error.whitelabel.enabled=false
server.error.path=/error
server.error.include-stacktrace=never


# Custom upload directory for profile pictures
file.upload-dir=/home/user/Documents


spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB


