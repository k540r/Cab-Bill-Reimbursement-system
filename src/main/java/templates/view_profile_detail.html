<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<!-- Required meta tags -->
<meta name="_csrf" th:content="${_csrf.token}" />
<meta name="_csrf_header" th:content="${_csrf.headerName}" />
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">

<!-- Meta -->

<link rel="shortcut icon"
	href="https://bisag-n.gov.in/images/logos/bisag_logo.png">
<link rel="shortcut icon" th:href="@{/assets/images/bisag_logo.png}">

<!-- Title -->
<title>Bootstrap Admin Dashboards</title>

<!-- *************
			************ Common Css Files *************
		************ -->
<th:block th:replace="Header.html::allcsslink"></th:block>

</head>

<body>

	
	<!-- Page wrapper start -->
	<div class="page-wrapper">

		<!-- Sidebar wrapper start -->
		<nav class="sidebar-wrapper">

			<!-- Sidebar brand starts -->
			<div class="sidebar-brand">
				<a href="index.html" class="logo"> <img
					th:src="@{/assets/images/bisag_logo.png}" alt="Admin Dashboards" />
				</a>
			</div>
			<!-- Sidebar brand starts -->

			<!-- Sidebar menu starts -->
			<div class="sidebar-menu"
				th:insert="Header.html::Admin-sidemnubar"></div>
			<!-- Sidebar menu ends -->

		</nav>
		<!-- Sidebar wrapper end -->

		<!-- *************
				************ Main container start *************
			************* -->
		<div class="main-container">

			<!-- Page header starts -->
			<div class="page-header">

				<div class="toggle-sidebar" id="toggle-sidebar">
					<i class="bi bi-list"></i>
				</div>

				<!-- Header actions ccontainer start -->
				<div class="header-actions-container">

					<!-- Header actions start -->
					<ul class="header-actions">
						<li class="dropdown"><a href="#" id="userSettings"
							class="user-settings" data-toggle="dropdown" aria-haspopup="true">
							
								<span class="avatar"> <img
									th:src="@{${adminProfilePicturePath}}" class="img-fluid" /> <span
									class="status online"></span>
							</span>
						</a>
							<div class="dropdown-menu dropdown-menu-end"
								aria-labelledby="userSettings">
								<div class="header-profile-actions">
									<a href="profile.html">Profile</a> <a
										href="account-settings.html">Settings</a> <a
										href="javascript:void(0)" id="logoutF">Logout</a>
								</div>
							</div></li>
					</ul>
					<!-- Header actions end -->

				</div>
				<!-- Header actions ccontainer end -->

			</div>
			<!-- Page header ends -->
			
			<!-- Content wrapper scroll start -->
			<div class="content-wrapper-scroll">

				<!-- Content wrapper start -->
				<div class="content-wrapper">

					<!-- Row start -->
					<div class="row gutters">
						<div class="col-sm-12 col-12">

							<div class="profile-header">
								<h1>
									Welcome, <b><span class="text-yellow"
										th:text="${emp.full_name}"></span></b>
								</h1>
								<div class="profile-header-content">
									<div class="profile-header-tiles">
										<div class="row gutters">
											<div class="col-sm-4 col-12">
												<div class="profile-tile shade-light">
													<span class="icon"> <i
														class="bi bi-person-bounding-box"></i>
													</span>
													<h6>
														Reporting Personnel - <span th:text="${emp.reporting_per}"></span>
													</h6>
												</div>
											</div>
											<div class="col-sm-4 col-12 ">
												<div class="profile-tile shade-yellow">
													<span class="icon"> <i class="bi bi-briefcase"></i>
													</span>
													<h6>
														Designation - <span th:text="${emp.jobTitle}">India</span>
													</h6>
												</div>
											</div>
											<div class="col-sm-4 col-12">
												<div class="profile-tile shade-dark">
													<span class="icon"> <i class="bi bi-telephone"></i>
													</span>
													<h6>
														Mobile - <span th:text="${emp.contact_number}">1234567890</span>
													</h6>
												</div>
											</div>
										</div>
									</div>
									<div class="profile-avatar-tile">
										<img th:src="@{${employeeProfilePicturePath}}"
											alt="Bootstrap Gallery" class="img-fluid" />
									</div>
								</div>
							</div>

						</div>
					</div>
					<!-- Row end -->

					<!-- Row start -->
					<div class="row gutters">
						<div class="col-lg-8 col-sm-12 col-12">
							<!-- Row start -->
							<div class="row gutters">
								<div class="col-sm-12 col-12">
									<!-- Card start -->
									<div class="card">
										<div class="card-header"></div>
										<div class="card-body">
											<div class="row">
												<form action="#" th:object="${emp}" method="post">
													<div class="row">
														<div class="col-xxl-4 col-sm-6 col-12">
															<!-- Form Field Start -->
															<div class="mb-3">
																<label for="fullName" class="form-label">Department
																</label>
																
																<input type="text" class="form-control" id="department"
																	th:field="*{department}" readonly>
															</div>
														</div>
														<div class="col-xxl-4 col-sm-6 col-12">
															<!-- Form Field Start -->
															<div class="mb-3">
																<label for="email" class="form-label">Email ID</label> <input
																	type="text" class="form-control" id="email"
																	th:field="*{email}" readonly>
															</div>
														</div>
														<div class="col-xxl-4 col-sm-6 col-12">
															<!-- Form Field Start -->
															<div class="mb-3">
																<label for="dateOfBirth" class="form-label">Date
																	Of Birth</label>
																<div class="input-group">
																	<span class="input-group-text"> <i
																		class="bi bi-calendar4"></i>
																	</span> <input type="text" id="dateOfBirth"
																		class="form-control datepicker"
																		th:field="*{dateOfBirth}" readonly>
																</div>
															</div>
														</div>
														<div class="col-xxl-8 col-sm-6 col-12">
															<!-- Form Field Start -->
															<div class="mb-3">
																<label for="address" class="form-label">Agency</label> <input
																	type="text" class="form-control" id="agency"
																	th:field="*{agency}" readonly>
															</div>
														</div>
														
														<div class="col-xxl-4 col-sm-6 col-12">
															<!-- Form Field Start -->
															<div class="mb-3">
																<label for="hometown" class="form-label">Hometown</label>
																<input type="text" class="form-control" id="hometown"
																	th:field="*{hometown}" readonly>
															</div>
														</div>
														<div class="col-xxl-4 col-sm-6 col-12">
															<!-- Form Field Start -->
															<div class="mb-3">
																<label for="doj" class="form-label">Joining Date</label>
																<div class="input-group">
																	<span class="input-group-text"> <i
																		class="bi bi-calendar4"></i>
																	</span> <input type="text" id="joiningDate"
																		class="form-control datepicker"
																		th:field="*{joiningDate}" readonly>
																</div>
															</div>
														</div>
														<div class="col-xxl-4 col-sm-6 col-12">
															<!-- Form Field Start -->
															<div class="mb-3">
																<label for="department" class="form-label">Experience</label>
																<input type="text" class="form-control" id="exp"
																	readonly>
															</div>
														</div>
														<div class="col-xxl-4 col-sm-6 col-12">
															<!-- Form Field Start -->
															<div class="mb-3">
																<label for="agency" class="form-label"></label>
																
															</div>
														</div>
														<div class="col-xxl-4 col-sm-6 col-12">
															<label for="status" class="form-label"></label>
															
														</div>
													</div>

													<div class="col-sm-12 col-12">

													</div>
												</form>
											</div>
										</div>
									</div>
									<!-- Card end -->
								</div>
							</div>
							<!-- Row end -->
						</div>
						<div class="col-lg-4 col-sm-12 col-12">
							<!-- Row start -->
							<div class="row gutters">
								<div class="col-sm-6 col-12">
									<!-- Card start -->
									<div class="award-tile shade-green">
										<div class="award-icon">
											<i class="bi bi-receipt"></i>
										</div>
										<h3>2</h3>
										<h4>Certifications</h4>
									</div>
									<!-- Card end -->
								</div>
								<div class="col-sm-6 col-12">
									<!-- Card start -->
									<div class="award-tile shade-blue">
										<div class="award-icon">
											<i class="bi bi-gem"></i>
										</div>
										<h3>7</h3>
										<h4>Awards</h4>
									</div>
									<!-- Card end -->
								</div>
							</div>

							<div class="row gutters">
								<div class="col-sm-12 col-12">
									<!-- Card start -->
									<div class="award-tile shade-green"></div>
									<!-- Card end -->
								</div>

							</div>
							<!-- Row end -->
						</div>

					</div>
					<!-- Row end -->

				</div>
				<!-- Content wrapper end -->

				<!-- App Footer start -->
				<div class="app-footer">
					<span>© BISAG-N 2024</span>
				</div>
				<!-- App footer end -->

			</div>
			<!-- Content wrapper scroll end -->

		</div>
		<!-- *************
				************ Main container end *************
			************* -->

	</div>
	<div th:replace="Header.html::changePasswordmodal"></div>
	<!-- Page wrapper end -->
	<form th:action="@{/logout}" method="post" id="logoutForm"
		name="logoutForm"></form>
	<!-- *************
			************ Required JavaScript Files *************
		************* -->
	<!-- Required jQuery first, then Bootstrap Bundle JS -->
	<script th:src="@{/assets/js/jquery.min.js}"></script>
	<script th:src="@{/assets/js/bootstrap.bundle.min.js}"></script>
	<script th:src="@{/assets/js/modernizr.js}"></script>
	<script th:src="@{/assets/js/moment.js}"></script>

	<!-- *************
			************ Vendor Js Files *************
		************* -->

	<!-- Overlay Scroll JS -->
	<script
		th:src="@{/assets/vendor/overlay-scroll/jquery.overlayScrollbars.min.js}"></script>
	<script th:src="@{/assets/vendor/overlay-scroll/custom-scrollbar.js}"></script>

	<!-- Main Js Required -->
	<script th:src="@{/assets/js/main.js}"></script>
	<script th:src="@{/js/common.js}"></script>
	<script type="text/javascript">
		$(document).ready(function() {
			const doj = $("#joiningDate").val();
			const exp = calculateAge(doj);
			$("#exp").val(exp)

		});
	</script>
</body>

</html>
