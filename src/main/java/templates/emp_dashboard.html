<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<!-- Required meta tags -->
<meta name="_csrf" th:content="${_csrf.token}" />
<meta name="_csrf_header" th:content="${_csrf.headerName}" />
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">

<!-- Meta -->


	<link rel="shortcut icon" th:href="@{/assets/images/bisag_logo.png}">

<!-- Title -->
<title>Bootstrap Admin Dashboards</title>


<!-- *************
			************ Common Css Files *************
		************ -->
<!-- Animated css -->

<th:block th:replace="Header.html::allcsslink"></th:block>


</head>

<body>

	
	<!-- Page wrapper start -->
	<div class="page-wrapper">

		<!-- Sidebar wrapper start -->
		<nav class="sidebar-wrapper">

			<!-- Sidebar brand starts -->
			<div class="sidebar-brand">
				<a href="emp_Dash" class="logo"> <img
					th:src="@{/assets/images/bisag_logo.png}" 
					alt="Admin Dashboards" />
				</a>
			</div>
			<!-- Sidebar brand starts -->
			
<!-- sidemenubar used with fragement -->
			<div class="sidebar-menu" th:insert="Header.html::side-menu-bar"></div>

		</nav>
		<!-- Sidebar wrapper end -->

		<!-- *************
				************ Main container start *************
			************* -->
		<div class="main-container">

			<!-- Page header starts -->
			<div class="page-header" th:replace="Header.html::user-pageheader"></div>

			<!-- Content wrapper scroll start -->
			<div class="content-wrapper-scroll">

				<!-- Content wrapper start -->
				<div class="content-wrapper">


					<!-- Row start -->
					<div class="row gutters">
						<div class="col-sm-12 col-12">

							<div class="profile-header">
								<h1>
									Welcome, <b><span class="text-yellow"
										th:text="${emp.full_name}"></span></b>
								</h1>
								<div class="profile-header-content">
									<div class="profile-header-tiles">
										<div class="row gutters">
											<div class="col-sm-4 col-12">
												<div class="profile-tile shade-light">
													<span class="icon"> <i
														class="bi bi-person-bounding-box"></i>
													</span>
													<h6>
														Manager - <span th:text="${emp.reporting_per}"></span>
													</h6>
												</div>
											</div>
											<div class="col-sm-4 col-12 ">
												<div class="profile-tile shade-yellow">
													<span class="icon"> <i class="bi bi-briefcase"></i>
													</span>
													<h6>
														Designation - <span th:text="${emp.jobTitle}">India</span>
													</h6>
												</div>
											</div>
											<div class="col-sm-4 col-12">
												<div class="profile-tile shade-dark">
													<span class="icon"> <i class="bi bi-telephone"></i>
													</span>
													<h6>
														Department - <span th:text="${emp.department}">1234567890</span>
													</h6>
												</div>
											</div>
										</div>
									</div>
									<div class="profile-avatar-tile">
										
										<img th:src="@{${profilePicturePath}}" alt="Bootstrap Gallery"
											class="img-fluid" />

									</div>
								</div>
							</div>

						</div>
					</div>
					<!-- Row end -->

					<!-- Row start -->
					<div class="row gutters">
						<div class="col-lg-8 col-sm-12 col-12">
							<!-- Row start -->
							<div class="row gutters">
								<div class="col-sm-12 col-12">
									<!-- Card start -->
									<div class="card">
										<div class="card-header"></div>
										<div class="card-body">
											<div class="row">
												<form action="#" th:object="${emp}" method="post">
													<div class="row">
														<div class="col-xxl-4 col-sm-6 col-12">
															<!-- Form Field Start -->
															<div class="mb-3">
																<label for="fullName" class="form-label">Mobile
																</label> <input type="text" class="form-control"
																	id="contact_number" th:field="*{contact_number}"
																	readonly>
															</div>
														</div>
														<div class="col-xxl-4 col-sm-6 col-12">
															<!-- Form Field Start -->
															<div class="mb-3">
																<label for="email" class="form-label">Email ID</label> <input
																	type="text" class="form-control" id="email"
																	th:field="*{email}" readonly>
															</div>
														</div>
														<div class="col-xxl-4 col-sm-6 col-12">
															<!-- Form Field Start -->
															<div class="mb-3">
																<label for="dateOfBirth" class="form-label">Date
																	Of Birth</label>
																<div class="input-group">
																	<span class="input-group-text"> <i
																		class="bi bi-calendar4"></i>
																	</span> <input type="text" id="dateOfBirth"
																		class="form-control datepicker"
																		th:field="*{dateOfBirth}" readonly>
																</div>
															</div>
														</div>
														<div class="col-xxl-8 col-sm-6 col-12">
															<!-- Form Field Start -->
															<div class="mb-3">
																<label for="address" class="form-label">Address</label>
																<input type="text" class="form-control" id="email"
																	th:field="*{currentAddress}" readonly>
															</div>
														</div>
														
														<div class="col-xxl-4 col-sm-6 col-12">
															<!-- Form Field Start -->
															<div class="mb-3">
																<label for="hometown" class="form-label">Hometown</label>
																<input type="text" class="form-control" id="hometown"
																	th:field="*{hometown}" readonly>
															</div>
														</div>
														<div class="col-xxl-4 col-sm-6 col-12">
															<!-- Form Field Start -->
															<div class="mb-3">
																<label for="doj" class="form-label">Joining Date</label>
																<div class="input-group">
																	<span class="input-group-text"> <i
																		class="bi bi-calendar4"></i>
																	</span> <input type="text" id="joiningDate"
																		class="form-control datepicker"
																		th:field="*{joiningDate}" readonly>
																</div>
															</div>
														</div>
														<div class="col-xxl-4 col-sm-6 col-12">
															<!-- Form Field Start -->
															<div class="mb-3">
																<label for="department" class="form-label">Experience</label>
																<input type="text" class="form-control" id="exp"
																	readonly>
															</div>
														</div>
														<div class="col-xxl-4 col-sm-6 col-12">
															<!-- Form Field Start -->
															<div class="mb-3">
																<label for="agency" class="form-label">Agency</label> <input
																	type="text" class="form-control" id="agency"
																	th:field="*{agency}" readonly>
															</div>
														</div>
													</div>

													<div class="col-sm-12 col-12">
														<hr>
														<button class="btn btn-info">Save Settings</button>
													</div>
												</form>
											</div>
										</div>
									</div>
									<!-- Card end -->
								</div>
							</div>
							<!-- Row end -->
						</div>
						<div class="col-lg-4 col-sm-12 col-12">
							<!-- Row start -->
							<div class="row gutters">
								<div class="col-sm-6 col-12">
									<!-- Card start -->
									<div class="award-tile shade-green">
										<div class="award-icon">
											
										</div>
										
									</div>
									<!-- Card end -->
								</div>
								<div class="col-sm-6 col-12">
									<!-- Card start -->
									<div class="award-tile shade-blue">
										<div class="award-icon">
											
										</div>
										
									</div>
									<!-- Card end -->
								</div>
							</div>
							<!-- Row end -->
						</div>
					</div>
					<!-- Row end -->

				</div>
				<!-- Content wrapper end -->

				<!-- App Footer start -->
				<div class="app-footer" th:insert="footer.html::footer">
				<!-- App footer end -->

			</div>
			<!-- Content wrapper scroll end -->

		</div>
		<!--  Main container end  -->

	</div>
	
<!-- Change password modal -->

	<div th:replace="Header.html::user-changePasswordmodal"></div>
	<!--end  -->



	<!-- Page wrapper end -->
	<form th:action="@{/logout}" method="post" id="logoutForm"
		name="logoutForm"></form>
		
		
	<!-- common script files replace -->
	<div th:replace="footer.html:: common-scripts"></div>
	
	<script type="text/javascript">
		$(document).ready(function() {
			const doj = $("#joiningDate").val();
			const exp = calculateAge(doj);
			$("#exp").val(exp)
		});
	</script>

	<script>
		// Function to hide messages after 5 seconds
		$(document).ready(function() {
			setTimeout(function() {
				$('.alert').fadeOut('fast'); // Fade out all elements with 'alert' class
			}, 5000); // 5000 milliseconds = 5 seconds
		});
	</script>
</body>

</html>
