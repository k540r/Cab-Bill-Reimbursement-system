		<script>
    document.addEventListener('DOMContentLoaded', function () {
        const statusFilter = document.getElementById('statusFilter');
        const dateFilter = document.getElementById('dateFilter');

        // Set default date to current month and year
        const today = new Date();
        const year = today.getFullYear();
        const month = ('0' + (today.getMonth() + 1)).slice(-2); // Add leading zero
        dateFilter.value = `${year}-${month}`;

        statusFilter.addEventListener('change', filterRows);
        dateFilter.addEventListener('change', filterRows);

        function filterRows() {
            const statusFilterValue = statusFilter.value;
            const dateFilterValue = dateFilter.value;
            const rows = document.querySelectorAll('#submittedbillstatus tbody tr');

            rows.forEach(function (row) {
                const status = row.getAttribute('data-status');
                const date = row.getAttribute('data-date').substring(0, 7); // Extract "YYYY-MM" format

                const statusMatch = (statusFilterValue === 'All' || status === statusFilterValue);
                const dateMatch = (dateFilterValue === '' || date === dateFilterValue);

                if (statusMatch && dateMatch) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }

        // Apply initial filter
        filterRows();      
        
    });

		<script>
    document.addEventListener('DOMContentLoaded', function () {
        const dateFilter = document.getElementById('dateFilter');
        const downloadZipButton = document.getElementById('downloadZip');
        const employeeElement = document.getElementById('employee');

        // Extract employee ID from URL
        const urlPath = window.location.pathname;
        const employeeId = urlPath.substring(urlPath.lastIndexOf('/') + 1);

        const today = new Date();
        const year = today.getFullYear();
        const month = ('0' + (today.getMonth() + 1)).slice(-2);
        dateFilter.value = `${year}-${month}`;

        if (downloadZipButton) {
            downloadZipButton.addEventListener('click', function () {
                const selectedDate = dateFilter.value;
                
                // Get employee name from the HTML element
                const employeeName = employeeElement.textContent.trim();

                // Make an AJAX call to trigger the download
                const xhr = new XMLHttpRequest();
                var contextPath = window.location.pathname.split('/')[1];
                xhr.open('GET', `/${contextPath}/admin/downloadZip?monthYear=` + selectedDate + `&employeeId=` + employeeId, true);
                xhr.responseType = 'blob';

                xhr.onload = function () {
                    if (xhr.status === 200) {
                        // Create a link to trigger the download
                        const blob = new Blob([xhr.response], { type: 'application/zip' });
                        const downloadLink = document.createElement('a');
                        downloadLink.href = window.URL.createObjectURL(blob);
                        
                        /* downloadLink.download = employee+'_'+month+'-'+year+'.zip'; */
                        
                        // Use the employee's name and selected month-year as the file name
                        const [selectedYear, selectedMonth] = selectedDate.split('-');
                        downloadLink.download = employeeName + '_' + selectedMonth + '-' + selectedYear + '.zip';
                        
                        downloadLink.click();
                    } else {
                        alert('Please select the month & year correctly and try again!');
                    }
                };

                xhr.send();
            });
        } else {
            console.error("Download ZIP button not found.");
        }
    });
</script>
		<script>
$(document).ready(function() {
    // Retrieve the CSRF token from meta tags
    var csrfToken = $('meta[name="_csrf"]').attr('content');
    var csrfHeader = $('meta[name="_csrf_header"]').attr('content');

    // Function to set the bill ID when the modal is opened
    window.setBillId = function(billId) {
        $('#billId').val(billId); // Set the hidden input field with the bill ID
    };

    // When the reject button is clicked
    $('#rejectSubmit').click(function() {
        // Get the bill ID and remarks from the modal
        var billId = $('#billId').val();  // Assuming this is set before opening the modal
        var remarks = $('#remarks').val();

        // Check if the remarks are provided
        if (!remarks) {
            alert('Please enter remarks.');
            return;
        }

        // Get the context path
        var contextPath = window.location.pathname.substring(0, window.location.pathname.indexOf("/", 2));

        // Send the AJAX request to update the bill status
        $.ajax({
            type: 'POST',
            url: contextPath + '/admin/updateBillStatusApproved',  // Adjust this URL if necessary
            data: {
                billId: billId,
                remarks: remarks,
                status: 'Rejected'  // Sending 'Rejected' status
            },
            beforeSend: function(xhr) {
                // Add the CSRF token to the request header
                xhr.setRequestHeader(csrfHeader, csrfToken);
            },
            success: function(response) {
                $('#rejectionModal').modal('hide');  // Close the modal
                alert('Bill rejected successfully!');  // Show success message
                location.reload();              
            },
            error: function(xhr, status, error) {
                alert('An error occurred: ' + xhr.responseText);  // Show error message
            }
        });
    });
});
</script>
