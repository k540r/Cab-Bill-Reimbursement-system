<style>
/* Glowing border for the outer box */
/* Glowing border container with conic gradient */
.glowing-border-container {
    padding: 5px;
   /*  border-radius: 50px; */
    background: transparent;
    position: relative;
    overflow: hidden;
    
   
    
}

/* Conic gradient border */
.glowing-border-container:before {
    content: '';
    position: absolute;
    top: 0; /* Align the gradient border correctly */
    left: 0;
    right: 0;
    bottom: 0;
    border-radius: 10px; /* Match border radius */
     /* Set desired width and height */
    width: 200px; /* Adjust the width */
    height: 1000px; /* Adjust the height */
    
    margin: auto; /* To center the container on the page */
    background: conic-gradient(from 280deg, rgba(255, 153, 51, 1), rgba(255, 153, 51, 1)); /* Single color */
    z-index: -1; /* Place it behind the container */
   
    animation: conicRotate 3s linear infinite;
    transform-origin: center; /* Center the rotation */
}

/* Add the glowing shadow effect */
.glowing-border-container:after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0, 123, 255, 0.6);
    z-index: -1;
    animation: glowing 1.5s infinite;
}

/* Keyframes for rotating conic gradient */
@keyframes conicRotate {
    0% {
        transform: rotate(0deg);
    }
    100% {
        transform: rotate(180deg);
    }
}

/* Keyframes for glowing effect */

} */

    <div class="glowing-border-container">
 <form th:action="@{/login}" method="post">
        <div class="login-box">
            <div class="login-form">
                <a class="login-logo"> <img th:src="@{/assets/images/bisag_logo.png}" alt="Admin Dashboards" /></a>
                <div class="login-welcome">
                    Welcome back, <br />Please login to your account.
                </div>

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border-color: lightblack;">
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 256 256" height="24" width="24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M234.38,210a123.36,123.36,0,0,0-60.78-53.23,76,76,0,1,0-91.2,0A123.36,123.36,0,0,0,21.62,210a12,12,0,1,0,20.77,12c18.12-31.32,50.12-50,85.61-50s67.49,18.69,85.61,50a12,12,0,0,0,20.77-12ZM76,96a52,52,0,1,1,52,52A52.06,52.06,0,0,1,76,96Z"></path>
                            </svg>
                        </span> 
                        <input type="text" class="form-control" name="username" placeholder="Enter Username" style="border-color: lightblack;" required>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <label class="form-label">Password</label> 
                        <a th:href="@{/forgot_password}" class="btn-link ml-auto">Forgot password?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text"> 
                            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="24" width="24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
                            </svg>
                        </span> 
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter Password" required>
                    </div>
                    <div class="mt-2">
                        <input type="checkbox" onclick="toggleVisibility()"> 
                        <label class="form-label">Show Password</label>
                    </div>
                </div>

                <div class="login-form-actions">
                    <button type="submit" class="btn">
                        <span class="icon"> <i class="bi bi-arrow-right-square"></i></span> Login
                    </button>
                </div>
                <div class="login-form-footer">
                    <div class="additional-link">
                        Don't have an account? <a th:href="@{/employee_registration}">Signup</a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${message}" class="alert" th:classappend="${message.contains('successful') ? 'alert-success' : 'alert-danger'}" id="alertMessage">
            <p th:text="${message}"></p>
        </div>
    </form>
</div>

	<!-- JavaScript to auto-hide alert after 5 seconds -->
	<script>
		$(document).ready(function() {
			setTimeout(function() {
				$("#alertMessage").fadeOut("slow");
			}, 4000); // 4 seconds timer
		});
	</script>



	<script>
		function toggleVisibility() {
			var passwordField = document.getElementById("password");
			if (passwordField.type === "password") {
				passwordField.type = "text";
			} else {
				passwordField.type = "password";
			}
		}
	</script>
