<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<!-- Required meta tags -->
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">

<!-- Meta -->
<link rel="shortcut icon"
	href="https://bisag-n.gov.in/images/logos/bisag_logo.png">



<!-- Title -->
<title>BISAG-N Admin Dashboard</title>

<!-- *************
     ************ Common Css Files *************
     ************ -->

<!-- Animated css -->
<th:block th:replace="Header.html::allcsslink"></th:block>

<style>
#chartdiv {
	width: 100%;
	height: 500px;
}

#yearSelect {
	font-size: 1rem; /* Larger font size */
	padding: 0.75rem; /* Larger padding */
	border-radius: 0.375rem; /* Rounded corners */
	border: 2px solid #007bff; /* Blue border */
	background-color: #f8f9fa; /* Light background color */
	color: #495057; /* Text color */
}

#yearSelect option {
	background-color: #e9ecef; /* Light grey background for options */
	color: #495057; /* Text color for options */
}

#yearSelect option:hover {
	background-color: #ced4da; /* Darker grey background on hover */
}
</style>
<!-- Resources -->
<script src="https://cdn.amcharts.com/lib/5/index.js"></script>
<script src="https://cdn.amcharts.com/lib/5/xy.js"></script>
<script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>
</head>

<body>

	<!-- Loading wrapper start -->
	<div id="loading-wrapper">
		<div class="spinner">
			<div class="line1"></div>
			<div class="line2"></div>
			<div class="line3"></div>
			<div class="line4"></div>
			<div class="line5"></div>
			<div class="line6"></div>
		</div>
	</div>
	<!-- Loading wrapper end -->

	<!-- Page wrapper start -->
	<div class="page-wrapper">

		<!-- Sidebar wrapper start -->
		<nav class="sidebar-wrapper">

			<!-- Sidebar brand starts -->
			<div class="sidebar-brand">
				<a href="commonDash" class="logo"> <img
					th:src="@{/assets/images/bisag_logo.png}" alt="Admin Dashboards" />
				</a>
			</div>
			<!-- Sidebar brand starts -->

			<!-- Sidebar menu starts -->
			<div class="sidebar-menu" th:insert="Header.html::Admin-sidemnubar"></div>
			<!-- Sidebar menu ends -->

		</nav>
		<!-- Sidebar wrapper end -->

		<!-- *************
				************ Main container start *************
			************* -->
		<div class="main-container">

			<!-- Page header starts -->
			<div class="page-header" th:replace="Header.html::admin-page-header"></div>
			<!-- Page header ends -->

			<!-- Content wrapper scroll start -->
			<div class="content-wrapper-scroll">

				<!-- Content wrapper start -->
				<div class="content-wrapper">

				

					<!-- Row start -->
					<div class="row">
						<div class="col-xxl-12  col-sm-12 col-12">

							<div class="card">
								<div class="card-body">

									<!-- Row start -->
									<div class="table-responsive">
										<table id="registerTable" class="table custom-table">
											<thead>
												<tr>
													<th>S. No.</th>
													<th>Full Name</th>
													<th>Email</th>
													<th>Contact Number</th>
													<th>Job Title</th>
													<th>Joining Date</th>
													<th>Agency</th>
													<th>Department</th>
													<th>Reporting Personnel</th>
													<!-- <th class="actions">Actions</th> -->
												</tr>
											</thead>
											<tbody>
												<tr th:each="employee : ${manager}">
													<td class="row-id"></td>
													<td th:text="${employee.Full_name}"></td>
													<td th:text="${employee.email}"></td>
													<td th:text="${employee.contact_number}"></td>
													<td th:text="${employee.jobTitle}"></td>
													<td th:text="${employee.joiningDate}"></td>
													<td th:text="${employee.agency}"></td>
													<td th:text="${employee.department}"></td>
													<td th:text="${employee.reporting_per}"></td>
													<!-- <td><a
														th:href="@{/admin/registeredemployee(id=${employee.id})}"
														class="viewRow"> <i class="bi bi-eye text-blue"></i>
													</a></td> -->
												</tr>
											</tbody>
										</table>
									</div>
									<!-- Row end -->

								</div>
							</div>

						</div>

					</div>
					<!-- Row end -->


					<!-- Row end -->
				</div>




				<!-- Content wrapper end -->

				<!-- App Footer start -->
				<div class="app-footer" th:insert="footer.html::footer"></div>
				<!-- App footer end -->

			</div>
			<!-- Content wrapper scroll end -->

		</div>
		<!-- *************
				************ Main container end *************
			************* -->

	</div>
	<!-- Page wrapper end -->


	<div th:replace="Header.html::changePasswordmodal"></div>

	<form th:action="@{/logout}" method="post" id="logoutForm"
		name="logoutForm"></form>
	<!-- *************
			************ Required JavaScript Files *************
		************* -->
	<!-- Required jQuery first, then Bootstrap Bundle JS -->
	<script th:src="@{/assets/js/jquery.min.js}"></script>
	<script th:src="@{/assets/js/bootstrap.bundle.min.js}"></script>
	<script th:src="@{/assets/js/modernizr.js}"></script>
	<script th:src="@{/assets/js/moment.js}"></script>


	<!-- *************
			************ Vendor Js Files *************
		************* -->

	<div th:replace="footer.html:: common-scripts"></div>

	<script>
		$(document).ready(function() {
			$('#registerTable').DataTable({
				"paging" : true,
				"searching" : true,
				"ordering" : true,
				"info" : true,
				
			/* 	order : [ [ 0, 'desc' ] ], */
				
				"initComplete": function(settings, json) {
		            console.log("DataTables initialized");
		            console.log("Settings: ", settings);
		            console.log("JSON Data: ", json);
		        }
			
			});
			
		    if (!table) {
		        console.error("DataTable failed to initialize");
		    } else {
		        console.log("DataTable initialized successfully");
		    }
		});
	</script>




	<script>
    document.addEventListener("DOMContentLoaded", function () {
        const table = document.getElementById("registerTable");
        const rows = table.querySelectorAll("tbody tr");

        rows.forEach((row, index) => {
            row.querySelector(".row-id").textContent = index + 1; // Starting ID from 1
        });
    });
     </script>


</body>

</html>
