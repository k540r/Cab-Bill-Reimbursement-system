<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<!-- Required meta tags -->
<meta name="_csrf" th:content="${_csrf.token}" />
<meta name="_csrf_header" th:content="${_csrf.headerName}" />
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">

<!-- Meta -->

<link rel="shortcut icon"
	href="https://bisag-n.gov.in/images/logos/bisag_logo.png">
	<link rel="shortcut icon" th:href="@{/assets/images/bisag_logo.png}">

<!-- Title -->
<title>Bill Submitted</title>

<!-- *************
			************ Common Css Files *************
		************ -->
<!-- Animated css -->
<th:block th:replace="Header.html::allcsslink"></th:block>



</head>

<body>

	<!-- Loading wrapper start -->
	<div id="loading-wrapper">
		<div class="spinner">
			<div class="line1"></div>
			<div class="line2"></div>
			<div class="line3"></div>
			<div class="line4"></div>
			<div class="line5"></div>
			<div class="line6"></div>
		</div>
	</div>
	<!-- Loading wrapper end -->

	<!-- Page wrapper start -->
	<div class="page-wrapper">

		<!-- Sidebar wrapper start -->
		<nav class="sidebar-wrapper">

			<!-- Sidebar brand starts -->
			<div class="sidebar-brand">
				<a href="commonDash" class="logo"> <img
					th:src="@{/assets/images/bisag_logo.png}" 
					alt="Admin Dashboards" />
				</a>
			</div>
			<!-- Sidebar brand starts -->

			<!-- Sidebar menu starts -->
			<div class="sidebar-menu"
				th:insert="Header.html::Admin-sidemnubar"></div>
			<!-- Sidebar menu ends -->

		</nav>
		<!-- Sidebar wrapper end -->

		<!-- *************
				************ Main container start *************
			************* -->
		<div class="main-container">

			<!-- Page header starts -->
			<div class="page-header" th:replace="Header.html::admin-billsubmitted"></div>
			<!-- Page header ends -->

			<!-- Content wrapper scroll start -->
			<!-- <div class="content-wrapper-scroll"> -->

			<!-- Content wrapper start -->
			<!-- <div class="content-wrapper"> -->

			<!-- Row start -->
			<div class="row">
				<div class="col-xxl-3 col-sm-6 col-12">
					<div class="stats-tile">
						<div class="sale-icon shade-green">
							<i class="bi bi-check2-square"></i>
						</div>
						<div class="sale-details">
							<h3 class="text-green" th:text="${approvedEmployeeCount}">0</h3>
							<p>Approved</p>
						</div>
					</div>
				</div>
				<div class="col-xxl-3 col-sm-6 col-12">
					<div class="stats-tile">
						<div class="sale-icon shade-yellow">
							<i class="bi bi-exclamation-diamond"></i>
						</div>
						<div class="sale-details">
							<h3 class="text-yellow" th:text="${pendingEmployeeCount}">0</h3>
							<p>Pending</p>
						</div>
					</div>
				</div>
				<div class="col-xxl-3 col-sm-6 col-12">
					<div class="stats-tile">
						<div class="sale-icon shade-yellow">
							<i class="bi bi-cash-coin"></i>
						</div>
						<div class="sale-details">
							<h3 class="text-yellow"
								th:text="'Rs ' + ${#numbers.formatDecimal(totalPendingAmount, 1, 2)}">0</h3>
							<p>Total Pending Amount</p>
						</div>
					</div>
				</div>
				<div class="col-xxl-3 col-sm-6 col-12">
					<div class="stats-tile">
						<div class="sale-icon shade-blue">
							<i class="bi bi-cash-coin"></i>
						</div>
						<div class="sale-details">
							<h3 class="text-blue"
								th:text="'Rs ' + ${#numbers.formatDecimal(totalApprovedAmount, 1, 2)}">0</h3>
							<p>Total Bill Amount</p>
						</div>
					</div>
				</div>
			</div>
			<!-- Row end -->

			<div class="content-wrapper-scroll">
				<!-- Content wrapper start -->
				<div class="content-wrapper">
					<!-- Row start -->
					<div class="row">
					
			<!-- Row start -->
						<div class="row">
							<div class="col-xxl-12  col-sm-12 col-12">

								<div class="card">
									<div class="card-body">
										<!-- Row start -->
										<div class="table-responsive">
											<table id="submittedBillTable" class="table custom-table">
												<thead>
													<tr>

														<th>Name</th>
														<th>Contact Number</th>
														<th>Job Title</th>
														<th>Joining Date</th>
														<!-- <!-- <th>To Date</th> -->
														<th>Department</th>
														<th>Total bills</th>
														<th>Pending Bill Count</th>
														<!-- <th>Status</th> -->
														<th class="actions">Actions</th>
													</tr>
												</thead>
												<tbody>

													<tr th:each="emp : ${empDetails}">
														<td th:text="${emp.key.full_name}"></td>
														<td th:text="${emp.key.contact_number}"></td>
														<td th:text="${emp.key.jobTitle}"></td>
														<td th:text="${emp.key.joiningDate}"></td>
														<td th:text="${emp.key.department}"></td>
														<td th:text="${emp.value}"></td>
														<td
															th:text="${pendingBillCounts.get(emp.key) != null ? pendingBillCounts.get(emp.key) : 0}"></td>
														
														</td>
														<td><a
															th:href="@{/admin/submittedbillstatus/{id}(id=${emp.key.id})}"
															class="viewRow"> <i class="bi bi-eye text-blue"></i>
														</a></td>
													</tr>
												</tbody>
											</table>
										</div>
										<!-- Row end -->
									</div>
								</div>

							</div>

						</div>
						<!-- Row end -->

					</div>
					<!-- Content wrapper end -->

					<!-- App Footer start -->
					<div class="app-footer" th:insert="footer.html::footer"></div>
					<!-- App footer end -->

				</div>
				<!-- Content wrapper scroll end -->

			</div>
			<!-- *************
				************ Main container end *************
			************* -->
		</div>
		<div th:replace="Header.html::changePasswordmodal"></div>
		<!-- Page wrapper end -->
		<form th:action="@{/logout}" method="post" id="logoutForm"
			name="logoutForm"></form>

		<div th:replace="footer.html:: common-scripts"></div>



		<script>
			$(document).ready(function() {
				$('#submittedBillTable').DataTable({
					"paging" : true,
					"searching" : false,
					"ordering" : true,
					"info" : true
				});
			});
		</script>

</body>
</html>
